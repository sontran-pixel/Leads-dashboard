<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Đặt lịch online</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --blue:#3B82F6;--blue-dark:#1D4ED8;--blue-light:#EFF6FF;
  --ink:#0F172A;--ink2:#334155;--muted:#94A3B8;
  --bg:#F1F5F9;--card:#FFFFFF;--border:#E2E8F0;
  --green:#10B981;--green-light:#ECFDF5;
  --red:#EF4444;--r:16px;
  --shadow:0 2px 12px rgba(15,23,42,.08);
  --shadow-lg:0 8px 32px rgba(15,23,42,.14);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--ink);min-height:100dvh;max-width:430px;margin:0 auto;display:flex;flex-direction:column}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes pop{0%{transform:scale(.8);opacity:0}60%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

/* LOADING */
#loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100dvh;gap:16px;background:var(--bg)}
.spin{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
#loading p{font-size:15px;color:var(--muted);font-weight:500}

/* ERROR */
#error-screen{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100dvh;padding:32px;text-align:center;gap:12px}
#error-screen .err-icon{font-size:56px}
#error-screen h3{font-size:20px;font-weight:700}
#error-screen p{font-size:14px;color:var(--muted);line-height:1.6}

/* HEADER WITH BANNER */
.header{position:relative;height:320px;overflow:hidden;background:#1E3A8A}
.banner-slide{
  position:absolute;inset:0;background-size:cover;background-position:center;
  opacity:0;transition:opacity .8s ease;
}
.banner-slide.on{opacity:1}
.header-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to bottom,rgba(15,23,42,.02) 0%,rgba(15,23,42,.45) 100%);
  z-index:1;
}
.header-content{
  position:absolute;bottom:0;left:0;right:0;
  padding:14px 18px 16px;z-index:2;
  display:flex;align-items:center;gap:12px;
  background:linear-gradient(to top,rgba(15,23,42,.55) 0%,rgba(15,23,42,.1) 60%,transparent 100%);
}
.shop-avatar{
  width:56px;height:56px;border-radius:16px;
  background:rgba(255,255,255,.2);backdrop-filter:blur(8px);
  border:2px solid rgba(255,255,255,.3);
  display:flex;align-items:center;justify-content:center;
  font-size:26px;flex-shrink:0;
}
.shop-info{flex:1}
.shop-name{font-size:24px;font-weight:800;color:#fff;letter-spacing:-.3px;text-shadow:0 2px 8px rgba(0,0,0,.4)}
.shop-addr{font-size:14px;color:rgba(255,255,255,.85);margin-top:4px;font-weight:600;display:flex;align-items:center;gap:4px}
/* Banner dots */
.banner-dots{
  position:absolute;top:14px;left:50%;transform:translateX(-50%);
  display:flex;gap:5px;z-index:3;
}
.banner-dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.45);cursor:pointer;transition:all .3s}
.banner-dot.on{background:#fff;width:14px;border-radius:3px}

/* STEPS */
.steps-wrap{padding:0 14px;margin-top:0;position:relative;z-index:10}
.steps{
  display:flex;align-items:center;
  background:var(--card);border-radius:16px;
  padding:14px 16px;box-shadow:var(--shadow-lg);
}
.st-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.st-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;transition:all .25s}
.st-dot.done{background:var(--green);color:#fff}
.st-dot.on{background:var(--blue);color:#fff;box-shadow:0 0 0 4px var(--blue-light)}
.st-dot.off{background:var(--bg);color:var(--muted)}
.st-lbl{font-size:12px;font-weight:700;color:var(--muted)}
.st-item.on .st-lbl{color:var(--blue)}
.st-line{flex:1;height:2px;background:var(--border);margin:0 4px 14px;transition:background .25s}
.st-line.done{background:var(--green)}

/* SCROLL */
.scroll{flex:1;overflow-y:auto;padding:14px 14px 120px}

/* SECTION TITLE */
.sec-title{font-size:14px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin:0 2px 12px}

/* SERVICE GRID — 2 cột với ảnh */
.svc-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.svc-card{
  background:var(--card);border-radius:16px;
  overflow:hidden;box-shadow:var(--shadow);
  border:2.5px solid transparent;transition:all .2s;cursor:pointer;
}
.svc-card.sel{border-color:var(--blue);box-shadow:0 0 0 3px rgba(59,130,246,.15)}
.svc-img{
  width:100%;height:100px;
  background:var(--bg);
  background-size:cover;background-position:center;
  position:relative;
}
.svc-img-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to bottom,transparent 40%,rgba(15,23,42,.5));
  opacity:0;transition:opacity .2s;
}
.svc-card.sel .svc-img-overlay{opacity:1}
.svc-check-badge{
  position:absolute;top:8px;right:8px;
  width:22px;height:22px;border-radius:50%;
  background:rgba(255,255,255,.3);border:2px solid rgba(255,255,255,.6);
  display:flex;align-items:center;justify-content:center;
  font-size:10px;color:transparent;transition:all .2s;
}
.svc-card.sel .svc-check-badge{background:var(--blue);border-color:var(--blue);color:#fff}
.svc-body{padding:10px 12px 12px}
.svc-name{font-size:15px;font-weight:800;color:var(--ink);line-height:1.3}
.svc-meta{display:flex;justify-content:space-between;align-items:center;margin-top:5px}
.svc-dur{font-size:13px;color:var(--muted);font-weight:600}
.svc-price{font-size:15px;font-weight:800;color:var(--blue)}
/* Detail expand */
.svc-detail{
  display:none;padding:8px 12px 12px;
  background:var(--blue-light);
  border-top:1px solid rgba(59,130,246,.15);
}
.svc-card.sel .svc-detail{display:block;animation:fadeUp .2s ease}
.svc-detail ul{list-style:none;display:flex;flex-direction:column;gap:4px}
.svc-detail ul li{font-size:13px;color:var(--ink2);display:flex;align-items:flex-start;gap:5px;line-height:1.5;font-weight:600}
.svc-detail ul li::before{content:'✓';color:var(--blue);font-weight:800;flex-shrink:0}

/* FORM */
.form-card{background:var(--card);border-radius:16px;padding:18px;box-shadow:var(--shadow);margin-bottom:10px}
.fld{margin-bottom:14px}
.fld:last-child{margin-bottom:0}
.fld label{font-size:13px;font-weight:800;color:var(--ink2);display:block;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.fld input{
  width:100%;padding:14px 16px;
  border:2px solid var(--border);border-radius:12px;
  font-size:16px;font-family:'Nunito',sans-serif;font-weight:600;
  color:var(--ink);background:var(--card);transition:all .15s;
  -webkit-appearance:none;
}
.fld input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 4px var(--blue-light)}

/* DATE SELECTOR */
.date-scroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;margin-bottom:14px}
.date-scroll::-webkit-scrollbar{display:none}
.date-btn{
  flex-shrink:0;width:56px;
  border:2px solid var(--border);border-radius:14px;
  padding:10px 6px;text-align:center;cursor:pointer;
  background:var(--card);transition:all .15s;box-shadow:var(--shadow);
}
.date-btn.sel{border-color:var(--blue);background:var(--blue);box-shadow:0 4px 14px rgba(59,130,246,.35)}
.date-btn:active{transform:scale(.94)}
.date-dow{font-size:12px;color:var(--muted);margin-bottom:3px;font-weight:700;text-transform:uppercase}
.date-d{font-size:24px;font-weight:800;color:var(--ink)}
.date-m{font-size:12px;color:var(--muted);margin-top:2px;font-weight:600}
.date-btn.sel .date-dow,.date-btn.sel .date-d,.date-btn.sel .date-m{color:#fff}

/* TIME GRID */
.time-label{font-size:14px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.time-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.tb{
  padding:12px 4px;border:2px solid var(--border);
  border-radius:12px;font-size:15px;font-weight:700;
  text-align:center;cursor:pointer;background:var(--card);
  color:var(--ink);transition:all .15s;box-shadow:var(--shadow);
}
.tb:active{transform:scale(.93)}
.tb.sel{background:var(--blue);border-color:var(--blue);color:#fff;box-shadow:0 4px 14px rgba(59,130,246,.4)}
.tb.blk{background:var(--bg);color:var(--border);text-decoration:line-through;cursor:not-allowed;box-shadow:none;border-color:var(--border)}
.conflict{background:#FEF2F2;border:1.5px solid #FCA5A5;border-radius:12px;padding:10px 14px;font-size:13px;color:var(--red);margin-top:10px;display:none;line-height:1.5;font-weight:600}

/* REVIEW */
.review-card{background:var(--card);border-radius:16px;padding:20px;box-shadow:var(--shadow)}
.rv-row{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--border)}
.rv-row:last-child{border:none}
.rv-lbl{font-size:13px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.rv-val{font-size:16px;font-weight:700;text-align:right;max-width:60%}
.rv-val.hi{color:var(--blue)}

/* SUCCESS */
.success{background:var(--card);border-radius:20px;padding:36px 24px;text-align:center;margin:8px 0;display:none;box-shadow:var(--shadow-lg);animation:fadeUp .3s ease}
.success-icon{font-size:64px;display:block;margin-bottom:14px;animation:pop .4s ease .1s both}
.success h3{font-size:22px;font-weight:800;margin-bottom:8px}
.success p{font-size:15px;color:var(--muted);line-height:1.7;font-weight:500}
.success-pill{display:inline-flex;align-items:center;gap:7px;margin-top:16px;background:var(--green-light);border-radius:30px;padding:8px 18px;font-size:14px;font-weight:700;color:var(--green)}
.gc-dot{width:8px;height:8px;border-radius:50%;background:var(--green)}

/* CTA BAR */
.cta-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(255,255,255,.94);backdrop-filter:blur(16px);padding:14px 16px calc(14px + env(safe-area-inset-bottom,0px));border-top:1px solid var(--border)}
.btn-main{width:100%;padding:16px;background:linear-gradient(135deg,var(--blue-dark),var(--blue));color:#fff;border:none;border-radius:14px;font-size:17px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .15s;letter-spacing:.2px;box-shadow:0 4px 16px rgba(59,130,246,.4)}
.btn-main:active{opacity:.85;transform:scale(.98)}
.btn-main:disabled{opacity:.35;cursor:not-allowed;box-shadow:none}
.btn-back{width:100%;padding:12px;margin-top:8px;background:transparent;color:var(--ink2);border:2px solid var(--border);border-radius:14px;font-size:16px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .15s}
.btn-back:active{background:var(--bg)}

#app{display:none;flex-direction:column;flex:1}
</style>
</head>
<body>

<div id="loading"><div class="spin"></div><p>Đang tải thông tin tiệm...</p></div>

<div id="error-screen">
  <div class="err-icon">😕</div>
  <h3>Không tìm thấy tiệm</h3>
  <p id="error-msg">Link đặt lịch không hợp lệ.<br>Vui lòng liên hệ chủ tiệm.</p>
</div>

<div id="app">
  <!-- HEADER BANNER -->
  <div class="header" id="header">
    <div id="banner-wrap"></div>
    <div class="header-overlay"></div>
    <div class="banner-dots" id="banner-dots"></div>
    <div class="header-content">
      <div class="shop-avatar" id="shop-logo"></div>
      <div class="shop-info">
        <div class="shop-name" id="shop-name"></div>
        <div class="shop-addr">📍 <span id="shop-addr"></span></div>
      </div>
    </div>
  </div>

  <!-- STEPS -->
  <div class="steps-wrap">
    <div class="steps">
      <div class="st-item on" id="si1"><div class="st-dot on" id="sd1">1</div><div class="st-lbl">Dịch vụ</div></div>
      <div class="st-line" id="sl1"></div>
      <div class="st-item" id="si2"><div class="st-dot off" id="sd2">2</div><div class="st-lbl">Thông tin</div></div>
      <div class="st-line" id="sl2"></div>
      <div class="st-item" id="si3"><div class="st-dot off" id="sd3">3</div><div class="st-lbl">Thời gian</div></div>
      <div class="st-line" id="sl3"></div>
      <div class="st-item" id="si4"><div class="st-dot off" id="sd4">4</div><div class="st-lbl">Xác nhận</div></div>
    </div>
  </div>

  <div class="scroll" id="scroll">

    <!-- STEP 1 -->
    <div id="s1">
      <div class="sec-title">Chọn dịch vụ</div>
      <div class="svc-grid" id="svc-list"></div>
    </div>

    <!-- STEP 2 -->
    <div id="s2" style="display:none">
      <div class="sec-title">Thông tin của bạn</div>
      <div class="form-card">
        <div class="fld"><label>Họ và tên *</label><input id="cname" type="text" placeholder="Nguyễn Thị Lan" autocomplete="name"></div>
        <div class="fld"><label>Số điện thoại *</label><input id="cphone" type="tel" placeholder="0901 234 567" autocomplete="tel"></div>
        <div class="fld"><label>Ghi chú</label><input id="cnote" type="text" placeholder="Dị ứng tinh dầu, yêu cầu khác..."></div>
      </div>
    </div>

    <!-- STEP 3 -->
    <div id="s3" style="display:none">
      <div class="sec-title">Chọn ngày</div>
      <div class="date-scroll" id="date-scroll"></div>
      <div class="time-label">Giờ trống – <span id="date-lbl" style="font-weight:500;text-transform:none;letter-spacing:0;color:var(--ink)"></span></div>
      <div class="time-grid" id="tgrid"></div>
      <div class="conflict" id="conflict">⚠️ <span id="cmsg"></span></div>
    </div>

    <!-- STEP 4 -->
    <div id="s4" style="display:none">
      <div class="sec-title">Xác nhận thông tin</div>
      <div class="review-card" id="rv-content"></div>
    </div>

    <!-- SUCCESS -->
    <div class="success" id="success">
      <span class="success-icon">🎉</span>
      <h3>Đặt lịch thành công!</h3>
      <p id="success-detail"></p>
      <div class="success-pill"><span class="gc-dot"></span>Đã ghi vào lịch hẹn</div>
      <br>
      <button class="btn-back" style="margin-top:16px;border-radius:30px;border-color:var(--green);color:var(--green)" onclick="resetAll()">+ Đặt lịch mới</button>
    </div>
  </div>

  <div class="cta-bar" id="cta-bar">
    <button class="btn-main" id="btn-main" onclick="nextStep()">Tiếp theo →</button>
    <button class="btn-back" id="btn-back" style="display:none" onclick="prevStep()">← Quay lại</button>
  </div>
</div>

<script>
// ── DEFAULT BANNER IMAGES (Quỳnh Spa) ────────────────────────
const DEFAULT_BANNERS = [
  'https://lh3.googleusercontent.com/d/1orkQjhSk1-T_GDkDEFAxoAk836yp4lXC',
  'https://lh3.googleusercontent.com/d/1k9J7dbj-fF9ta9sl3Di3P_bCRLFY73HM',
  'https://lh3.googleusercontent.com/d/1utGp0F-RuUsAZB0kmMn10yCke1sumqcc'
];

const DAYS=['CN','T2','T3','T4','T5','T6','T7'];
const DAYSFULL=['Chủ nhật','Thứ hai','Thứ ba','Thứ tư','Thứ năm','Thứ sáu','Thứ bảy'];
let CONFIG=null, curStep=1, selService=null, selDate=null, selTime=null;
let curBanner=0, bannerTimer=null;

// ── SUPABASE CONFIG (chỉ dùng anon key, an toàn để nhúng public) ──
const SUPABASE_URL='https://vxzhcrlavjhzhmwkakjz.supabase.co';
const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ4emhjcmxhdmpoemhtd2tha2p6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxODg4MzQsImV4cCI6MjA5NDc2NDgzNH0.vxftFMAAY1PJJ5uYd1Uq7hlnOfW3rI1e3e0mdV9WdgA';

function getShopId(){
  const p=new URLSearchParams(window.location.search);
  return p.get('shop')||p.get('id')||null;
}

// Lấy shop_id (uuid) + danh sách services (kèm uuid id) trực tiếp từ Supabase
async function fetchServicesFromSupabase(shopSlug){
  const headers={'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+SUPABASE_ANON_KEY};
  // 1. Tìm shop theo slug (shopId dùng trong URL, vd "quynhspa")
  const shopRes=await fetch(
    `${SUPABASE_URL}/rest/v1/shops?slug=eq.${encodeURIComponent(shopSlug)}&select=id,name,address`,
    {headers}
  );
  if(!shopRes.ok) return null;
  const shops=await shopRes.json();
  if(!shops.length) return null;
  const shop=shops[0];
  // 2. Lấy services thuộc shop đó, kèm id thật (uuid)
  const svcRes=await fetch(
    `${SUPABASE_URL}/rest/v1/services?shop_id=eq.${shop.id}&select=id,name,price,duration_min&order=price.asc`,
    {headers}
  );
  if(!svcRes.ok) return null;
  const services=await svcRes.json();
  return {shop,services};
}

function initBanner(banners){
  const wrap=document.getElementById('banner-wrap');
  const dots=document.getElementById('banner-dots');
  wrap.innerHTML=''; dots.innerHTML='';
  banners.forEach((url,i)=>{
    const slide=document.createElement('div');
    slide.className='banner-slide'+(i===0?' on':'');
    slide.style.backgroundImage=`url('${url}')`;
    wrap.appendChild(slide);
    const dot=document.createElement('div');
    dot.className='banner-dot'+(i===0?' on':'');
    dot.onclick=()=>goBanner(i);
    dots.appendChild(dot);
  });
  if(banners.length>1){
    if(bannerTimer) clearInterval(bannerTimer);
    bannerTimer=setInterval(()=>goBanner((curBanner+1)%banners.length),4000);
  }
}

function goBanner(n){
  const slides=document.querySelectorAll('.banner-slide');
  const dots=document.querySelectorAll('.banner-dot');
  if(!slides.length) return;
  slides[curBanner]?.classList.remove('on');
  dots[curBanner]?.classList.remove('on');
  curBanner=n;
  slides[curBanner]?.classList.add('on');
  dots[curBanner]?.classList.add('on');
}

function initApp(cfg){
  CONFIG=cfg;
  document.title=cfg.shopName+' – Đặt lịch online';
  document.getElementById('shop-logo').textContent=cfg.shopEmoji;
  document.getElementById('shop-name').textContent=cfg.shopName;
  document.getElementById('shop-addr').textContent=cfg.shopAddress;
  // Dùng banners từ JSON nếu có, fallback về DEFAULT
  const banners=cfg.banners||DEFAULT_BANNERS;
  initBanner(banners);
  renderServices(cfg);
  document.getElementById('app').style.display='flex';
  updateCta();
}

function renderServices(cfg){
  const list=document.getElementById('svc-list');
  list.innerHTML='';
  // Ảnh placeholder mặc định cho từng dịch vụ nếu không có trong JSON
  const placeholders=[
    'https://images.unsplash.com/photo-1600334089648-b0d9d3028eb2?w=300&q=70',
    'https://images.unsplash.com/photo-1570172619644-dfd03ed5d881?w=300&q=70',
    'https://images.unsplash.com/photo-1540555700478-4be289fbecef?w=300&q=70',
    'https://images.unsplash.com/photo-1512290923902-8a9f81dc236c?w=300&q=70',
  ];
  cfg.services.forEach((svc,idx)=>{
    const priceK=(svc.price/1000).toFixed(0)+'k';
    const imgUrl=svc.image||placeholders[idx%placeholders.length];
    const detailHtml=svc.details&&svc.details.length
      ?'<div class="svc-detail"><ul>'+svc.details.map(d=>'<li>'+d+'</li>').join('')+'</ul></div>'
      :'';
    const card=document.createElement('div');
    card.className='svc-card';
    card.innerHTML=`
      <div class="svc-img" style="background-image:url('${imgUrl}')">
        <div class="svc-img-overlay"></div>
        <div class="svc-check-badge">✓</div>
      </div>
      <div class="svc-body">
        <div class="svc-name">${svc.icon} ${svc.name}</div>
        <div class="svc-meta">
          <span class="svc-dur">⏱ ${svc.duration}ph</span>
          <span class="svc-price">${priceK}đ</span>
        </div>
      </div>
      ${detailHtml}`;
    card.onclick=()=>selSvc(card,svc.id,svc.name,svc.duration,svc.price,svc.icon);
    list.appendChild(card);
  });
}

async function loadShop(){
  const shopId=getShopId();
  if(!shopId){
    document.getElementById('loading').style.display='none';
    document.getElementById('error-screen').style.display='flex';
    return;
  }
  const base=location.href.split('/booking-customer.html')[0];
  const paths=[base+'/shops/'+shopId+'.json','/shops/'+shopId+'.json','shops/'+shopId+'.json'];
  let cfg=null;
  for(const path of paths){
    try{const res=await fetch(path);if(res.ok){cfg=await res.json();break;}}catch(e){}
  }

  // ── Gọi Supabase lấy UUID thật + dữ liệu mới nhất cho services ──
  // JSON tĩnh vẫn giữ để hiển thị banner/icon/details (nội dung trình bày),
  // nhưng id/price/duration luôn lấy từ Supabase (nguồn sự thật duy nhất).
  if(cfg){
    try{
      const live=await fetchServicesFromSupabase(shopId);
      if(live && live.services && live.services.length){
        cfg.shopUuid=live.shop.id; // lưu lại để dùng khi submit booking
        const staticByName={};
        (cfg.services||[]).forEach(s=>{staticByName[s.name.trim()]=s;});
        cfg.services=live.services.map(svc=>{
          const extra=staticByName[svc.name.trim()]||{};
          return{
            id:svc.id,                       // UUID thật — bắt buộc phải có
            name:svc.name,
            duration:svc.duration_min,
            price:svc.price,
            icon:extra.icon||'💆',
            image:extra.image,
            details:extra.details
          };
        });
      }
      // Nếu Supabase lỗi/không trả được gì: giữ nguyên cfg.services từ JSON tĩnh
      // (booking vẫn chạy nhưng sẽ thiếu service_id — sẽ cảnh báo ở selSvc/submit)
    }catch(e){
      console.warn('Không lấy được services từ Supabase, dùng tạm JSON tĩnh:',e);
    }
  }

  document.getElementById('loading').style.display='none';
  if(cfg) initApp(cfg);
  else{
    document.getElementById('error-screen').style.display='flex';
    document.getElementById('error-msg').textContent='Không tìm thấy tiệm "'+shopId+'".';
  }
}

function selSvc(card,id,name,dur,price,icon){
  document.querySelectorAll('.svc-card').forEach(e=>e.classList.remove('sel'));
  card.classList.add('sel');
  selService={id,name,dur,price,icon};
  if(!id) console.warn('⚠️ Dịch vụ "'+name+'" không có service_id (Supabase) — booking sẽ thiếu service_id khi lưu.');
  updateCta();
}

function buildDates(){
  const wrap=document.getElementById('date-scroll');
  wrap.innerHTML='';
  const today=new Date();
  for(let i=0;i<14;i++){
    const d=new Date(today);d.setDate(today.getDate()+i);
    const btn=document.createElement('div');
    btn.className='date-btn';
    btn.innerHTML=`<div class="date-dow">${DAYS[d.getDay()]}</div><div class="date-d">${d.getDate()}</div><div class="date-m">${d.getMonth()+1}/${String(d.getFullYear()).slice(2)}</div>`;
    btn.onclick=()=>pickDate(btn,d);
    wrap.appendChild(btn);
    if(i===0) pickDate(btn,d);
  }
}

function pickDate(btn,d){
  document.querySelectorAll('.date-btn').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel');
  selDate=d;
  document.getElementById('date-lbl').textContent=DAYSFULL[d.getDay()]+', '+d.getDate()+'/'+(d.getMonth()+1);
  buildSlots();
}

const bookedCache={};
async function buildSlots(){
  selTime=null;updateCta();
  document.getElementById('conflict').style.display='none';
  const g=document.getElementById('tgrid');
  g.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:20px;color:var(--muted);font-size:13px;font-weight:600">⏳ Đang kiểm tra lịch trống...</div>';
  const dateStr=selDate.toISOString().slice(0,10);
  const shopId=CONFIG.shopId||'';
  let bookedSlots=[];
  if(bookedCache[dateStr]!==undefined) bookedSlots=bookedCache[dateStr];
  else{
    try{bookedSlots=await fetchBookedJsonp(shopId,dateStr);}catch(e){bookedSlots=[];}
    bookedCache[dateStr]=bookedSlots;
  }
  g.innerHTML='';
  CONFIG.slots.forEach(s=>{
    const isBlocked=CONFIG.blockedSlots.includes(s)||bookedSlots.includes(s);
    const b=document.createElement('div');
    b.className='tb'+(isBlocked?' blk':'');
    b.textContent=s;
    if(isBlocked) b.title=bookedSlots.includes(s)?'Đã có khách đặt':'Không khả dụng';
    else b.onclick=()=>pickTime(b,s);
    g.appendChild(b);
  });
}

function fetchBookedJsonp(shopId,date){
  return new Promise((resolve,reject)=>{
    const cb='_be_'+Date.now();
    const script=document.createElement('script');
    const url=API_URL+'?action=getBooked&shopId='+encodeURIComponent(shopId)+'&date='+encodeURIComponent(date)+'&callback='+cb;
    const timer=setTimeout(()=>{cleanup();reject(new Error('timeout'));},8000);
    window[cb]=function(data){cleanup();resolve(Array.isArray(data.booked)?data.booked:[]);};
    function cleanup(){clearTimeout(timer);delete window[cb];if(script.parentNode)script.parentNode.removeChild(script);}
    script.onerror=()=>{cleanup();reject(new Error('error'));};
    script.src=url;document.head.appendChild(script);
  });
}

function pickTime(btn,t){
  document.querySelectorAll('.tb').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel');selTime=t;
  document.getElementById('conflict').style.display='none';
  updateCta();
}

function updateCta(){
  const btn=document.getElementById('btn-main');
  const back=document.getElementById('btn-back');
  if(!btn) return;
  back.style.display=curStep>1?'block':'none';
  if(curStep===1){btn.disabled=!selService;btn.textContent='Tiếp theo →';}
  else if(curStep===2){btn.disabled=false;btn.textContent='Tiếp theo →';}
  else if(curStep===3){btn.disabled=!selTime;btn.textContent='Xem lại →';}
  else if(curStep===4){btn.disabled=false;btn.textContent='✓ Xác nhận đặt lịch';}
}

function nextStep(){
  if(curStep===2){
    const nm=document.getElementById('cname').value.trim();
    const ph=document.getElementById('cphone').value.trim();
    if(!nm||!ph){shakeInput();return;}
  }
  if(curStep===4){submitBooking();return;}
  goStep(curStep+1);
}
function prevStep(){goStep(curStep-1);}

function goStep(n){
  document.getElementById('s'+curStep).style.display='none';
  curStep=n;
  document.getElementById('s'+curStep).style.display='block';
  if(n===3) buildDates();
  if(n===4) buildReview();
  for(let i=1;i<=4;i++){
    const dot=document.getElementById('sd'+i);
    const si=document.getElementById('si'+i);
    const line=document.getElementById('sl'+i);
    if(i<n){dot.className='st-dot done';dot.textContent='✓';si.className='st-item';}
    else if(i===n){dot.className='st-dot on';dot.textContent=i;si.className='st-item on';}
    else{dot.className='st-dot off';dot.textContent=i;si.className='st-item';}
    if(line) line.className='st-line'+(i<n?' done':'');
  }
  updateCta();
  document.getElementById('scroll').scrollTo({top:0,behavior:'smooth'});
}

function buildReview(){
  const d=selDate;
  const ds=DAYSFULL[d.getDay()]+', '+d.getDate()+'/'+(d.getMonth()+1)+'/'+d.getFullYear();
  const note=document.getElementById('cnote').value.trim();
  document.getElementById('rv-content').innerHTML=`
    <div class="rv-row"><span class="rv-lbl">Cửa hàng</span><span class="rv-val">${CONFIG.shopEmoji} ${CONFIG.shopName}</span></div>
    <div class="rv-row"><span class="rv-lbl">Dịch vụ</span><span class="rv-val">${selService.icon} ${selService.name}</span></div>
    <div class="rv-row"><span class="rv-lbl">Thời gian</span><span class="rv-val">${selService.dur} phút</span></div>
    <div class="rv-row"><span class="rv-lbl">Ngày & giờ</span><span class="rv-val hi">${selTime} – ${ds}</span></div>
    <div class="rv-row"><span class="rv-lbl">Khách hàng</span><span class="rv-val">${document.getElementById('cname').value}</span></div>
    <div class="rv-row"><span class="rv-lbl">Số điện thoại</span><span class="rv-val">${document.getElementById('cphone').value}</span></div>
    <div class="rv-row"><span class="rv-lbl">Giá dịch vụ</span><span class="rv-val hi">${(selService.price/1000).toFixed(0)}k đ</span></div>
    ${note?`<div class="rv-row"><span class="rv-lbl">Ghi chú</span><span class="rv-val">${note}</span></div>`:''}`;
}

async function submitBooking(){
  const btn=document.getElementById('btn-main');
  btn.disabled=true;btn.textContent='⏳ Đang gửi...';
  const d=selDate;
  const ds=DAYSFULL[d.getDay()]+', '+d.getDate()+'/'+(d.getMonth()+1);
  const payload={
    shopId:CONFIG.shopId||CONFIG.shopName,
    shopUuid:CONFIG.shopUuid||'',
    customerName:document.getElementById('cname').value.trim(),
    customerPhone:document.getElementById('cphone').value.trim(),
    serviceId:selService.id||'',
    service:selService.icon+' '+selService.name,
    duration:selService.dur,price:selService.price,
    date:selDate.toISOString().slice(0,10),time:selTime,
    note:document.getElementById('cnote').value.trim()
  };
  try{
    // Lưu ý: dùng Content-Type 'text/plain' thay vì 'application/json'.
    // Lý do: với mode 'no-cors', trình duyệt coi request có
    // Content-Type 'application/json' là "non-simple request" và có
    // thể tự ý loại bỏ/thay đổi header lúc gửi thật, khiến Apps Script
    // nhận body không đúng như mong đợi (một số field bị thiếu, ví dụ
    // serviceId). 'text/plain' luôn được coi là "simple request" nên
    // body luôn được gửi nguyên vẹn — và Apps Script vẫn JSON.parse()
    // được bình thường vì nó chỉ đọc nội dung text, không quan tâm
    // Content-Type khai báo là gì.
    await fetch(API_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(payload)});
    showSuccess(ds);
  }catch(err){
    btn.disabled=false;btn.textContent='✓ Xác nhận đặt lịch';
    alert('Có lỗi xảy ra, vui lòng thử lại!');
  }
}

function showSuccess(ds){
  document.getElementById('s4').style.display='none';
  document.getElementById('cta-bar').style.display='none';
  document.getElementById('success').style.display='block';
  document.getElementById('success-detail').textContent=`${document.getElementById('cname').value} – ${selService.name} lúc ${selTime}, ${ds}`;
  document.querySelector('.steps-wrap').style.display='none';
}

function resetAll(){
  curStep=1;selService=null;selDate=null;selTime=null;
  document.getElementById('success').style.display='none';
  document.getElementById('cta-bar').style.display='block';
  document.querySelector('.steps-wrap').style.display='block';
  ['cname','cphone','cnote'].forEach(id=>document.getElementById(id).value='');
  document.querySelectorAll('.svc-card').forEach(e=>e.classList.remove('sel'));
  goStep(1);
}

function shakeInput(){
  ['cname','cphone'].forEach(id=>{
    const el=document.getElementById(id);
    if(!el.value.trim()){
      el.style.borderColor='var(--red)';
      el.style.animation='shake .3s';
      setTimeout(()=>{el.style.borderColor='';el.style.animation='';},600);
    }
  });
}

const API_URL='https://script.google.com/macros/s/AKfycbypYjTHoh30O599O5zHEZWpWJRGoRanGRkdLWocbOo2rKq5OCBF9oVmeljXq7o4vteH/exec';
loadShop();
</script>
