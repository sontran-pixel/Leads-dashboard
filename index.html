<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BookEasy – Hệ thống đặt lịch online</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Be Vietnam Pro',sans-serif;background:#0F0D1A;color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.logo{font-size:52px;margin-bottom:16px}
h1{font-size:32px;font-weight:700;margin-bottom:8px;text-align:center}
.sub{font-size:16px;color:rgba(255,255,255,.5);margin-bottom:40px;text-align:center}
.links{display:flex;flex-direction:column;gap:12px;width:100%;max-width:320px}
.btn{display:block;padding:16px 20px;border-radius:14px;text-decoration:none;font-size:15px;font-weight:600;text-align:left;transition:transform .15s,opacity .15s}
.btn:active{transform:scale(.97);opacity:.85}
.btn-booking{background:linear-gradient(135deg,#E8477A,#C8306A);color:#fff}
.btn-dashboard{background:linear-gradient(135deg,#18A97A,#0D7A58);color:#fff}
.btn-admin{background:linear-gradient(135deg,#7C6EF5,#534AB7);color:#fff}
.btn-icon{font-size:20px;margin-right:10px}
.btn-desc{font-size:12px;font-weight:400;opacity:.8;display:block;margin-top:2px}
.footer{margin-top:40px;font-size:12px;color:rgba(255,255,255,.3)}
</style>
</head>
<body>
<div class="logo">📅</div>
<h1>BookEasy</h1>
<p class="sub">Hệ thống đặt lịch online cho Spa, Salon & Nhà hàng</p>

<div class="links">
  <a class="btn btn-booking" href="booking-customer.html?shop=quynhspa">
    <span class="btn-icon">🌸</span>Quỳnh Spa – Đặt lịch
    <span class="btn-desc">Trang đặt lịch dành cho khách hàng</span>
  </a>
  <a class="btn btn-dashboard" href="dashboard-v3.html">
    <span class="btn-icon">📊</span>Dashboard chủ tiệm
    <span class="btn-desc">Quản lý lịch hẹn và doanh thu</span>
  </a>
  <a class="btn btn-admin" href="bookeasy-admin.html">
    <span class="btn-icon">⚙️</span>Admin Panel
    <span class="btn-desc">Quản lý toàn bộ hệ thống</span>
  </a>
</div>

<p class="footer">BookEasy v1.0 · by Trần Thanh Sơn · BanHangTuDong247</p>
</body>
</html>
